events {}

http {
  server {
    listen 80;

    # Allow uploads larger than nginx's 1 MB default: reference-image /
    # color-match uploads are capped at 10 MB server-side, so 50m is ample here.
    # DB restore is the one exception and gets its own larger cap below.
    client_max_body_size 50m;

    # DB restore uploads the entire SQLite file, which outgrows the 50m default
    # once a library matures (STUDIO-77). Give this one internal, backend-
    # validated route a much larger ceiling without loosening the global cap that
    # keeps image/color-match uploads bounded.
    location = /api/database/restore {
      client_max_body_size 2g;
      proxy_pass http://backend:8000/database/restore;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://backend:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # LLM calls can take several minutes — raise timeout for all API requests.
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location / {
      proxy_pass http://frontend:3000/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
