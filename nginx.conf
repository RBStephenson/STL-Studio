events {}

http {
  server {
    listen 80;

    # Allow uploads larger than nginx's 1 MB default: reference-image /
    # color-match uploads are capped at 10 MB server-side, and DB restore can be
    # larger. 50 MB covers both without the proxy 413'ing before the backend.
    client_max_body_size 50m;

    location /api/ {
      proxy_pass http://backend:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend:3000/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
