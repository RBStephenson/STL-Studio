name: Release

# Two ways to release:
#   1. Actions tab -> "Release" -> Run workflow -> pick patch/minor/major.
#      Computes the next version, creates+pushes the tag, then builds & publishes.
#   2. Push a tag manually (git tag v1.2.3 && git push origin v1.2.3).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (ignored if version is set)"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version tag (e.g. v0.2.3) — overrides bump"
        type: string
        default: ""
  push:
    tags:
      - "v*"

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create and push the new tag
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      bootstrap_tag: ${{ steps.bootstrap.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need all tags to compute the next version

      - name: Compute tag
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Triggered by a manual tag push — just use it.
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "Using pushed tag ${GITHUB_REF_NAME}"
            exit 0
          fi

          # Allow an explicit version to override auto-computation.
          if [ -n "${{ inputs.version }}" ]; then
            newtag="${{ inputs.version }}"
            echo "Using explicit version: ${newtag}"
          else
            latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            latest=${latest:-v0.0.0}
            ver=${latest#v}
            IFS=. read -r major minor patch <<< "$ver"
            case "${{ inputs.bump }}" in
              major) major=$((major+1)); minor=0; patch=0 ;;
              minor) minor=$((minor+1)); patch=0 ;;
              patch) patch=$((patch+1)) ;;
            esac
            newtag="v${major}.${minor}.${patch}"
            echo "Latest tag: ${latest} -> new tag: ${newtag}"
          fi
          if git rev-parse "$newtag" >/dev/null 2>&1; then
            echo "Tag $newtag already exists — skipping tag creation."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$newtag" -m "Release $newtag"
            git push origin "$newtag"
          fi
          echo "tag=$newtag" >> "$GITHUB_OUTPUT"

      # Create the release as a DRAFT up front. The parallel build jobs upload
      # their platform binaries to this draft; a published release is immutable,
      # so we must not publish until every asset is attached (see publish job).
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.compute.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --generate-notes --title "$tag"
          else
            echo "Release $tag already exists — leaving as-is."
          fi

      - name: Resolve published bootstrap release
        id: bootstrap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --limit 100 \
            --json tagName,isDraft,isPrerelease,publishedAt \
            --jq '[.[] | select(.isDraft == false and .isPrerelease == false)][0].tagName')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "No published bootstrap release is available" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using bootstrap release $tag"

  release:
    needs: version
    uses: ./.github/workflows/build.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      release: true
      tag: ${{ needs.version.outputs.tag }}
      ref: ${{ needs.version.outputs.tag }}

  qualify:
    needs: [version, release]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout candidate harness
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download draft candidate assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          New-Item -ItemType Directory -Force candidate | Out-Null
          gh release download '${{ needs.version.outputs.tag }}' --dir candidate

      - name: Generate and validate checksums and update metadata
        shell: pwsh
        run: |
          $version = '${{ needs.version.outputs.tag }}'.TrimStart('v')
          python scripts/validate_release_assets.py candidate `
            --version $version --write-checksums

      - name: Upload checksum manifest to draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload '${{ needs.version.outputs.tag }}' candidate/SHA256SUMS --clobber

      - name: Download bootstrap installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          New-Item -ItemType Directory -Force bootstrap | Out-Null
          gh release download '${{ needs.version.outputs.bootstrap_tag }}' `
            --pattern 'STL-Studio-Setup-*.exe' --dir bootstrap

      - name: Qualify installed update before publication
        shell: pwsh
        run: |
          $bootstrap = Get-ChildItem bootstrap/STL-Studio-Setup-*.exe |
            Select-Object -First 1
          if (-not $bootstrap) { throw 'Bootstrap NSIS installer not found' }
          $version = '${{ needs.version.outputs.tag }}'.TrimStart('v')
          python scripts/smoke_installer.py $bootstrap.FullName `
            --candidate-dir candidate --expected-version $version `
            --diagnostics-dir release-qualification-diagnostics

      - name: Upload qualification diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-qualification-diagnostics
          path: release-qualification-diagnostics
          retention-days: 14
          if-no-files-found: warn

  publish:
    needs: [version, release, qualify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}   # this job has no checkout; tell gh the repo
        run: |
          draft=$(gh release view "${{ needs.version.outputs.tag }}" --json isDraft --jq .isDraft)
          if [ "$draft" != "true" ]; then
            echo "Candidate release is not a draft; refusing promotion" >&2
            exit 1
          fi
          gh release edit "${{ needs.version.outputs.tag }}" --draft=false
