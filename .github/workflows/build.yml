name: Build

# Reusable build of the standalone executables for Windows and Linux.
# Called by release.yml (publishes a Release) and build-check.yml (CI only).
on:
  workflow_call:
    inputs:
      release:
        description: "Publish artifacts to a GitHub Release"
        type: boolean
        default: false
      tag:
        description: "Release tag to publish under (required when release=true)"
        type: string
        default: ""
      ref:
        description: "Git ref to build (defaults to the triggering ref)"
        type: string
        default: ""
      release_draft:
        description: "Create/update release assets on a draft release"
        type: boolean
        default: true
      release_prerelease:
        description: "Mark created/updated release as a prerelease"
        type: boolean
        default: false
      artifact_retention_days:
        description: "Retention period for non-release CI artifacts"
        type: number
        default: 7
      desktop_version:
        description: "Optional semver for a non-release Windows candidate build"
        type: string
        default: ""

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux

    runs-on: ${{ matrix.os }}
    # Permissions are granted by the caller (release.yml grants contents:write
    # for the Release upload; build-check.yml grants only read). A reusable
    # workflow cannot request more than its caller passes in.

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      # ---- Build React frontend ----
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ---- Build Python executable ----
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend runtime dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip freeze > ../backend-runtime-requirements.txt

      - name: Generate backend SBOM
        run: |
          pip install cyclonedx-bom==7.3.0
          cyclonedx-py requirements backend-runtime-requirements.txt --output-file stl-studio-backend-${{ matrix.label }}.cdx.json

      - name: Install PyInstaller
        run: pip install pyinstaller

      # The backend exe is a headless windowless sidecar (Phase 2, STUDIO-72). On
      # Windows it is wrapped by Electron below; on Linux it ships as-is with the
      # browser fallback (#463). electron-builder expects the *unlabelled*
      # dist-standalone/stl-studio.exe, so packaging runs before any rename.
      - name: Build executable
        run: pyinstaller packaging/stl-studio.spec --distpath dist-standalone

      # ---- Smoke-test the frozen exe (STUDIO-102) ----
      # Build-only steps never launch the exe, so a frozen-import crash (e.g.
      # STUDIO-100: `No module named 'unittest'`) only surfaced once a user ran
      # the installer. Boot it here and fail loud if /api/health never answers.
      - name: Smoke-test standalone exe
        shell: bash
        run: |
          exe="dist-standalone/stl-studio"
          [ "${{ matrix.os }}" = "windows-latest" ] && exe="dist-standalone/stl-studio.exe"
          python scripts/smoke_boot.py "$exe"

      # ---- Windows: wrap the backend exe in the Electron NSIS installer ----
      # (Phase 4, STUDIO-74). desktop/electron-builder.yml copies the sidecar from
      # dist-standalone/ via extraResources and emits desktop/release/*.exe.
      - name: Install desktop deps
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: npm ci

      # Keep the complete desktop packaging graph: Electron is a development
      # dependency in package.json but its runtime is embedded in the installer.
      - name: Generate desktop SBOM
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        shell: bash
        run: npm sbom --sbom-format cyclonedx > ../stl-studio-desktop-windows.cdx.json

      # Stamps the installer with a real version so About/app.getVersion() show
      # something meaningful. Release builds get the semver tag (v1.2.3 -> 1.2.3);
      # the rolling main build's tag ("rolling") isn't semver, so it falls back to
      # a 0.0.0-<sha> prerelease version instead.
      - name: Set desktop app version
        if: ${{ matrix.os == 'windows-latest' && (inputs.release || inputs.desktop_version != '') }}
        working-directory: desktop
        shell: bash
        run: |
          requested="${{ inputs.desktop_version }}"
          tag="${{ inputs.tag }}"
          if [ -n "$requested" ]; then
            version="$requested"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${tag#v}"
          else
            version="0.0.0-$(git rev-parse --short HEAD)"
          fi
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Build desktop (tsc)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: npm run build

      - name: Package Electron installer (NSIS)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        # Unsigned v1 build — disable cert auto-discovery so a bare runner with no
        # signing identity doesn't fail the pack.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # `publish never` still generates latest.yml + blockmap from the GitHub
        # provider config; the workflow uploads all three assets to the same
        # draft release so users never see mismatched update metadata.
        run: npx --no-install electron-builder --win --publish never

      # Fail before upload if latest.yml points at a filename that the package
      # step did not actually produce. This prevents another published 404 like
      # v0.20.2's dots-vs-hyphens installer mismatch.
      - name: Validate Electron update artifact names
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $metadataPath = 'desktop/release/latest.yml'
          if (-not (Test-Path -LiteralPath $metadataPath)) {
            throw "Updater metadata not found: $metadataPath"
          }
          $metadata = Get-Content -Raw -LiteralPath $metadataPath
          $match = [regex]::Match($metadata, '(?m)^path:\s*(.+?)\s*$')
          if (-not $match.Success) {
            throw 'latest.yml does not contain a top-level path entry'
          }
          $installerName = $match.Groups[1].Value.Trim().Trim("'`"")
          $installerPath = Join-Path 'desktop/release' $installerName
          $blockmapPath = "$installerPath.blockmap"
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "latest.yml references missing installer: $installerName"
          }
          if (-not (Test-Path -LiteralPath $blockmapPath)) {
            throw "Updater blockmap missing for: $installerName"
          }
          Write-Host "Validated updater metadata: $installerName"

      # Exercise the artifact users actually run, not only the loose PyInstaller
      # sidecar: custom/default install, shortcuts, reinstall, Electron launch,
      # restart/data persistence, and uninstall cleanup (STUDIO-205).
      - name: Smoke-test installed Windows app
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem desktop/release/*.exe |
            Where-Object { $_.Name -notlike 'Uninstall*' } |
            Select-Object -First 1
          if (-not $installer) { throw 'NSIS installer not found' }
          python scripts/smoke_installer.py $installer.FullName --diagnostics-dir installer-smoke-diagnostics

      - name: Upload installed-app smoke diagnostics
        if: ${{ failure() && matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v7
        with:
          name: installed-app-smoke-diagnostics
          path: installer-smoke-diagnostics
          retention-days: 7
          if-no-files-found: warn

      # ---- Linux: label the loose binary (Windows retires its raw exe in favour
      #      of the installer above) ----
      - name: Rename artifact (Linux)
        if: matrix.os != 'windows-latest'
        run: mv dist-standalone/stl-studio dist-standalone/stl-studio-${{ matrix.label }}

      # Attest in the job that produced each subject so provenance identifies
      # the actual platform build, rather than the later qualification job.
      - name: Attest Windows binary provenance
        if: ${{ inputs.release && matrix.os == 'windows-latest' }}
        uses: actions/attest@v4
        with:
          subject-path: desktop/release/STL-Studio-Setup-*.exe

      - name: Attest Windows backend SBOM
        if: ${{ inputs.release && matrix.os == 'windows-latest' }}
        uses: actions/attest@v4
        with:
          subject-path: desktop/release/STL-Studio-Setup-*.exe
          sbom-path: stl-studio-backend-windows.cdx.json

      - name: Attest Windows desktop SBOM
        if: ${{ inputs.release && matrix.os == 'windows-latest' }}
        uses: actions/attest@v4
        with:
          subject-path: desktop/release/STL-Studio-Setup-*.exe
          sbom-path: stl-studio-desktop-windows.cdx.json

      - name: Attest Linux binary provenance
        if: ${{ inputs.release && matrix.os != 'windows-latest' }}
        uses: actions/attest@v4
        with:
          subject-path: dist-standalone/stl-studio-${{ matrix.label }}

      - name: Attest Linux backend SBOM
        if: ${{ inputs.release && matrix.os != 'windows-latest' }}
        uses: actions/attest@v4
        with:
          subject-path: dist-standalone/stl-studio-${{ matrix.label }}
          sbom-path: stl-studio-backend-${{ matrix.label }}.cdx.json

      # ---- Upload to the DRAFT release (release.yml publishes it afterwards) OR
      #      keep as a CI artifact (build-check). Uploading to a draft keeps the
      #      release mutable so each platform job can attach its artifact. ----
      # Windows ships the NSIS installer; Linux ships the loose binary.
      - name: Upload to draft release (Windows installer)
        if: ${{ inputs.release && matrix.os == 'windows-latest' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest.yml
            stl-studio-backend-windows.cdx.json
            stl-studio-desktop-windows.cdx.json
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          overwrite_files: true

      - name: Upload to draft release (Linux binary)
        if: ${{ inputs.release && matrix.os != 'windows-latest' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist-standalone/stl-studio-${{ matrix.label }}
            stl-studio-backend-${{ matrix.label }}.cdx.json
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          overwrite_files: true

      - name: Upload build artifact (Windows installer)
        if: ${{ !inputs.release && matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v7
        with:
          name: stl-studio-setup-${{ matrix.label }}
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest.yml
            stl-studio-backend-windows.cdx.json
            stl-studio-desktop-windows.cdx.json
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload build artifact (Linux binary)
        if: ${{ !inputs.release && matrix.os != 'windows-latest' }}
        uses: actions/upload-artifact@v7
        with:
          name: stl-studio-${{ matrix.label }}
          path: |
            dist-standalone/stl-studio-${{ matrix.label }}
            stl-studio-backend-${{ matrix.label }}.cdx.json
          retention-days: ${{ inputs.artifact_retention_days }}
