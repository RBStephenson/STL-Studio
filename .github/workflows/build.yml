name: Build

# Reusable build of the standalone executables for Windows and Linux.
# Called by release.yml (publishes a Release) and build-check.yml (CI only).
on:
  workflow_call:
    inputs:
      release:
        description: "Publish artifacts to a GitHub Release"
        type: boolean
        default: false
      tag:
        description: "Release tag to publish under (required when release=true)"
        type: string
        default: ""
      ref:
        description: "Git ref to build (defaults to the triggering ref)"
        type: string
        default: ""

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux

    runs-on: ${{ matrix.os }}
    # Permissions are granted by the caller (release.yml grants contents:write
    # for the Release upload; build-check.yml grants only read). A reusable
    # workflow cannot request more than its caller passes in.

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      # ---- Build React frontend ----
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ---- Build Python executable ----
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend deps + PyInstaller
        working-directory: backend
        run: pip install -r requirements.txt pyinstaller

      # Phase 2 (STUDIO-72): the desktop shell moved to Electron; the backend exe
      # is now a headless windowless sidecar, so there's no pywebview extra to
      # install. Electron packaging of this exe lands in Phase 3.
      - name: Build executable
        run: pyinstaller packaging/stl-library.spec --distpath dist-standalone

      # ---- Rename artifact with platform label ----
      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist-standalone/stl-library.exe dist-standalone/stl-library-${{ matrix.label }}.exe

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist-standalone/stl-library dist-standalone/stl-library-${{ matrix.label }}

      # ---- Upload to the DRAFT release (release.yml publishes it afterwards) OR
      #      keep as a CI artifact (build-check). Uploading to a draft keeps the
      #      release mutable so all three platform jobs can attach their binary. ----
      - name: Upload to draft release
        if: ${{ inputs.release }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: dist-standalone/stl-library-${{ matrix.label }}*
          draft: true            # stay a draft; release.yml's publish job flips it

      - name: Upload build artifact
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v7
        with:
          name: stl-library-${{ matrix.label }}
          path: dist-standalone/stl-library-${{ matrix.label }}*
          retention-days: 7
