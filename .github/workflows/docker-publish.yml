name: Build and Publish Docker Images

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: backend,  context: ./backend }
          - { service: frontend, context: ./frontend }

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action lowercases the name, which GHCR requires.
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.service }}
          # Release-driven versions publish semver tags. Pushes to main publish
          # the rolling dev tags :main, :latest, and :sha-<hash> so Docker users
          # can track the newest successful main build without a GitHub Release.
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          # latest=auto still allows release events to mark full releases as
          # :latest, while the explicit raw tag above makes main pushes update it.
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per service so the two builds don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
