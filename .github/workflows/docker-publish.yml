name: Build and Publish Docker Images

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: backend,  context: ./backend }
          - { service: frontend, context: ./frontend }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the name, which GHCR requires.
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.service }}
          # Release-driven versions: publishing a GitHub Release for tag v1.2.3
          # publishes :1.2.3, :1.2, :1 and :latest. Pushes to main publish :main
          # (moving) and :sha-<hash> (pinned) rolling dev images — no version, no
          # :latest. The semver values come from the release's git tag.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          # :latest tracks the newest published release, never a main push. A
          # pre-release (e.g. v1.2.3-rc1) is excluded from :latest by latest=auto.
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per service so the two builds don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
