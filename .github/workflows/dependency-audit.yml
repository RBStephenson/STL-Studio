name: Dependency Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend and audit tools
        run: |
          python -m venv .dependency-audit-venv
          .dependency-audit-venv/bin/pip install -r backend/requirements.txt
          pip install pip-audit==2.10.1 pip-licenses==5.5.5
      - name: Generate backend license inventory
        run: |
          mkdir -p dependency-audit/backend
          pip-licenses --python=.dependency-audit-venv/bin/python \
            --from=mixed --format=json \
            --output-file=dependency-audit/backend/licenses.json
      - name: Enforce backend license policy
        run: |
          python scripts/check_dependency_licenses.py \
            --policy scripts/dependency_license_policy.json \
            --pip dependency-audit/backend/licenses.json
      - name: Audit backend vulnerabilities
        run: |
          pip-audit --requirement backend/requirements.txt --format=json \
            --output=dependency-audit/backend/vulnerabilities.json
      - name: Upload backend dependency inventory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-dependency-audit
          path: dependency-audit/backend
          retention-days: 30
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Generate frontend license inventory
        run: |
          mkdir -p dependency-audit/frontend
          npx --yes license-checker-rseidelsohn@4.3.0 --json \
            --out dependency-audit/frontend/licenses.json \
            --start frontend
      - name: Enforce frontend license policy
        run: |
          python scripts/check_dependency_licenses.py \
            --policy scripts/dependency_license_policy.json \
            --node dependency-audit/frontend/licenses.json
      - name: Audit frontend vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high --json > ../dependency-audit/frontend/vulnerabilities.json
      - name: Upload frontend dependency inventory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dependency-audit
          path: dependency-audit/frontend
          retention-days: 30
          if-no-files-found: warn

  desktop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Generate desktop license inventory
        run: |
          mkdir -p dependency-audit/desktop
          npx --yes license-checker-rseidelsohn@4.3.0 --json \
            --out dependency-audit/desktop/licenses.json \
            --start desktop
      - name: Enforce desktop license policy
        run: |
          python scripts/check_dependency_licenses.py \
            --policy scripts/dependency_license_policy.json \
            --node dependency-audit/desktop/licenses.json
      - name: Audit desktop vulnerabilities
        working-directory: desktop
        run: npm audit --audit-level=high --json > ../dependency-audit/desktop/vulnerabilities.json
      - name: Upload desktop dependency inventory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-dependency-audit
          path: dependency-audit/desktop
          retention-days: 30
          if-no-files-found: warn
