name: Tests

# Runs the backend pytest suite on every PR to main and on pushes to main,
# so logic regressions are caught before they reach a release (the binary
# Build Check only verifies packaging, not behavior).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when new commits are pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements-test.txt

      # Chromium powers the painting PDF-export tests (#320). --with-deps adds
      # the system libraries headless Chromium needs on the runner.
      - name: Install Playwright Chromium
        working-directory: backend
        run: playwright install --with-deps chromium

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test
