name: Tests

# Runs the backend pytest suite on every PR to main and on pushes to main,
# so logic regressions are caught before they reach a release (the binary
# Build Check only verifies packaging, not behavior).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when new commits are pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pin matches requirements-test.txt so local and CI agree.
      - name: Ruff (backend)
        working-directory: backend
        run: |
          pip install ruff==0.15.20
          ruff check app tests scripts

      # scripts/ at repo root (build/CI tooling) is separate from backend/scripts.
      - name: Ruff (repo-root scripts)
        run: |
          pip install ruff==0.15.20
          ruff check scripts/smoke_boot.py scripts/test_smoke_boot.py

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint (frontend)
        working-directory: frontend
        run: npm run lint

      - name: TypeScript typecheck (frontend)
        working-directory: frontend
        run: npm run typecheck

  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements-test.txt

      # Chromium powers the painting PDF-export tests (#320). --with-deps adds
      # the system libraries headless Chromium needs on the runner.
      - name: Install Playwright Chromium
        working-directory: backend
        run: playwright install --with-deps chromium

      - name: Run pytest
        working-directory: backend
        run: pytest -v

      # scripts/smoke_boot.py's poll/timeout/crash logic (STUDIO-102) — repo-root
      # tooling, not part of the backend package, run separately from the above.
      - name: Run smoke_boot tests
        run: pytest -v scripts/test_smoke_boot.py

  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  desktop-vitest:
    # Logic-only tests (sidecar lifecycle, window state, secret key, menu
    # builders) run against injected fakes, not real Windows APIs, so this
    # doesn't need windows-latest — build.yml's Windows leg already covers the
    # real NSIS packaging path. build.yml only ran `tsc`, never `npm test`, so
    # these were previously untested in CI (STUDIO-147).
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Typecheck
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Run Vitest
        working-directory: desktop
        run: npm test
