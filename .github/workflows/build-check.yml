name: Build Check

# Verifies the standalone executables still build on Windows and Linux.
# Runs on PRs to main so packaging breakage is caught before it reaches a release.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    permissions:
      contents: read   # artifacts only, no Release publishing
    uses: ./.github/workflows/build.yml
    with:
      release: false
