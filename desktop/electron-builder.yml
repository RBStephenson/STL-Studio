# electron-builder configuration — Phase 3 (STUDIO-73).
#
# Produces a Windows NSIS installer that bundles the Electron shell plus the
# PyInstaller backend as an extraResources sidecar. v1 scope is Windows only;
# GitHub Releases supplies the electron-updater feed and SignPath will provide
# the production signing identity before 1.0.
#
# The backend exe must be built first (pyinstaller packaging/stl-studio.spec
# --distpath dist-standalone) — CI chains this in Phase 4 (STUDIO-74).
appId: com.stlstudio.desktop
productName: STL Studio
# Keep the packaged filename identical to the updater feed's safe URL.
artifactName: STL-Studio-Setup-${version}.${ext}
copyright: Copyright © STL Studio

directories:
  output: release
  buildResources: resources

publish:
  provider: github
  owner: RBStephenson
  repo: STL-Studio
  # Always publish the update feed to the "latest" channel, even for prerelease
  # versions (e.g. 1.0.0-beta.1) which electron-builder would otherwise route to a
  # "beta" channel (beta.yml). The release validator/qualifier expect latest.yml,
  # and stable users are kept off betas by the GitHub prerelease flag combined with
  # electron-updater's allowPrerelease=false — not by the channel name. (STUDIO-283)
  channel: latest

# App code shipped inside the asar archive.
files:
  - dist/**/*
  - index.html
  - splash.html
  - keyReveal.html
  # Splash art (resources/splash.png) + app icon, referenced at runtime.
  - resources/**/*

# The PyInstaller backend, copied verbatim into the packaged app's resources/
# dir (process.resourcesPath). resolveBackendExe() reads it there when packaged.
extraResources:
  - from: ../dist-standalone/stl-studio.exe
    to: stl-studio.exe

win:
  target: nsis
  icon: resources/stl_studio.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: STL Studio
