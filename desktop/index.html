<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>STL Studio</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        color: #e8e8e8;
        font-family: system-ui, sans-serif;
      }
      .shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
      }
      p {
        margin: 0;
        color: #999;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>STL Studio</h1>
      <p>Desktop shell — Phase 0 skeleton. Backend wiring arrives in Phase 1.</p>
    </div>
  </body>
</html>
