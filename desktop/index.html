<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>STL Studio</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        color: #e8e8e8;
        font-family: system-ui, sans-serif;
      }
      .shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
      }
      p {
        margin: 0;
        color: #999;
        font-size: 14px;
      }
      a {
        margin-top: 8px;
        padding: 10px 18px;
        border: 1px solid #465a78;
        border-radius: 8px;
        color: #dbeafe;
        text-decoration: none;
        background: #172033;
      }
      a:hover { background: #22304a; }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>STL Studio</h1>
      <p>STL Studio couldn't finish starting. Your catalog is safe.</p>
      <a href="stl-studio://retry-backend">Try again</a>
    </div>
  </body>
</html>
