<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>STL Studio — starting…</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #070b16;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .splash {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 24px;
        box-sizing: border-box;
      }
      .art {
        max-width: 88%;
        max-height: 74vh;
        object-fit: contain;
        /* Blend the art's dark edges into the window background. */
        filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.6));
      }
      .status {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9fb3d1;
        font-size: 15px;
        letter-spacing: 0.02em;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(59, 130, 246, 0.25);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <img class="art" src="resources/splash.png" alt="STL Studio" />
      <div class="status">
        <div class="spinner" aria-hidden="true"></div>
        <span id="msg">Starting STL Studio…</span>
      </div>
    </div>
    <script>
      // If the backend cold-start runs long, soften the message so it doesn't
      // look stuck. The window is replaced by the app as soon as it's healthy.
      setTimeout(function () {
        var el = document.getElementById("msg");
        if (el) el.textContent = "Still starting — first launch can take a moment…";
      }, 15000);
      // Past the window where a plain slow boot explains it, the likelier cause
      // is antivirus scanning the newly-installed files after an update
      // (STUDIO-341) — name it, so a long wait reads as expected rather than
      // hung. HEALTH_POLL_TIMEOUT_MS is 90s; this fires well before that ceiling.
      setTimeout(function () {
        var el = document.getElementById("msg");
        if (el) el.textContent = "Still starting — antivirus may be scanning the newly installed files after an update…";
      }, 25000);
    </script>
  </body>
</html>
