<!--
  Trimmed capture of a real Gumroad product page
  (https://francisquez.gumroad.com/l/qb01jshark), reduced to the <head> OG/meta
  markup that the single-product scraper parses. Session/CSRF tokens, the Stripe
  publishable key and the large Inertia data-page blob from the live page have
  been removed.

  Note the attribute shape that motivated issue #317: og:title and
  og:description carry their text in a `value=` attribute, while og:image uses
  `content=`.
-->

<meta property="og:title" value="QB01: J. Shark - 3D printing model " inertia="meta-property-og-title">
<meta property="og:site_name" value="Gumroad" inertia="meta-property-og-site_name">
<meta property="og:description" value="Hi!Q- Bestiary #01: J. Shark, Inspired by Jeff the Land Shark (Marvel), a darker version with a grotesque style and exaggerated proportions, highly characteristic of the Art Toy theme." inertia="meta-property-og-description">
<meta property="og:url" content="https://francisquez.gumroad.com/l/qb01jshark" inertia="meta-property-og-url">
