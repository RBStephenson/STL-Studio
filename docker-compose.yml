services:
  backend:
    build: ./backend
    # Bind published ports to loopback only — the API is unauthenticated and
    # must not be reachable from the LAN. Use the proxy at http://localhost.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      # Mount your external drives here — set LIBRARY_DIR / IMPORT_DIR in .env
      # (see .env.example). Windows example: LIBRARY_DIR=D:/3D STLs
      # Mac example:    LIBRARY_DIR=/Volumes/MyDrive1
      # The :-./data/... defaults keep `docker compose` from failing when .env
      # is absent; replace them with real paths to actually index your library.
      # - "${LIBRARY_DIR:-./data/library}:/library"
      - "${STL_DRIVE_1:-/dev/null}:/mnt/drive1"
      - "${STL_DRIVE_2:-/dev/null}:/mnt/drive2"
      - "${IMPORT_DIR:-/dev/null}:/import"
    environment:
      - DATABASE_URL=sqlite:////data/stl_inventory.db
      - REORGANIZE_WRITE_ENABLED=true
      - STL_ROOTS=/mnt/drive1,/mnt/drive2
      - STL_DRIVE_1=${STL_DRIVE_1:-}
      - STL_DRIVE_2=${STL_DRIVE_2:-}
      - PYTHONUNBUFFERED=1
    # Allows the backend to reach services on the host (e.g. Ollama at localhost:11434).
    # host-gateway resolves to the host's IP as seen from the container's network.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ollama-host:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # nginx reverse proxy so frontend can call /api without CORS issues
  proxy:
    image: nginx:alpine
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
