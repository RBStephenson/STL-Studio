services:
  backend:
    build: ./backend
    # Bind published ports to loopback only — the API is unauthenticated and
    # must not be reachable from the LAN. Reach the app via the frontend at
    # http://localhost, which serves the UI and proxies /api to this service.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      # Mount your external drives here — set LIBRARY_DIR / IMPORT_DIR in .env
      # (see .env.example). Windows example: LIBRARY_DIR=D:/3D STLs
      # Mac example:    LIBRARY_DIR=/Volumes/MyDrive1
      # The :-./data/... defaults keep `docker compose` from failing when .env
      # is absent; replace them with real paths to actually index your library.
      # - "${LIBRARY_DIR:-./data/library}:/library"
      - "${STL_DRIVE_1:-/dev/null}:/mnt/drive1"
      - "${STL_DRIVE_2:-/dev/null}:/mnt/drive2"
      - "${IMPORT_DIR:-/dev/null}:/import"
    environment:
      - DATABASE_URL=sqlite:////data/stl_inventory.db
      - REORGANIZE_WRITE_ENABLED=true
      - STL_ROOTS=/mnt/drive1,/mnt/drive2
      - STL_DRIVE_1=${STL_DRIVE_1:-}
      - STL_DRIVE_2=${STL_DRIVE_2:-}
      - PYTHONUNBUFFERED=1
      # Serving this behind a reverse proxy on a real domain? Allowlist that
      # hostname or writes are blocked (see docs/docker.md → TRUSTED_HOSTS).
      # - TRUSTED_HOSTS=stl.example.com
      # Encrypts stored API keys (AI/Cults3D/MMF). Without it, a generated key
      # lives only in memory and stored keys won't survive a restart — set a
      # stable value to persist them (see docs/docker.md → STL_SECRET_KEY).
      # - STL_SECRET_KEY=
    # Allows the backend to reach services on the host (e.g. Ollama at localhost:11434).
    # host-gateway resolves to the host's IP as seen from the container's network.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ollama-host:host-gateway"
    restart: unless-stopped

  # Serves the SPA and reverse-proxies /api to the backend, so it's the single
  # entry point — no separate proxy container needed. Published on :80 so the
  # app is at http://localhost. BACKEND_ORIGIN must match the backend service
  # name/port on this network.
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:80:3000"
    environment:
      - BACKEND_ORIGIN=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
