services:
  backend:
    build: ./backend
    # Bind published ports to loopback only — the API is unauthenticated and
    # must not be reachable from the LAN. Use the proxy at http://localhost.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      # Mount your external drives here — adjust paths for Windows/Mac
      # Windows example: "D:/3D STLs:/library"
      # Mac example:    "/Volumes/MyDrive1:/library"
      - "${LIBRARY_DIR}:/library"
      - "${IMPORT_DIR}:/import"
    environment:
      - DATABASE_URL=sqlite:////data/stl_inventory.db
      - REORGANIZE_WRITE_ENABLED=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # nginx reverse proxy so frontend can call /api without CORS issues
  proxy:
    image: nginx:alpine
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
